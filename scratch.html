<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#f5ede6" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>إلك… اكشطي</title>
<style>
  :root{
    --bg1:#f7efe8; --bg2:#efe3f0; --ink:#3b2f3a; --muted:#8a7d86;
    --accent:#c9698a; --accent-deep:#a84a6d;
    --card:rgba(255,255,255,.74); --shadow:0 24px 60px -24px rgba(120,60,90,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:Arial,"Segoe UI",Tahoma,sans-serif;color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100dvh;
    display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;padding:20px}

  .sky{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .dot{position:absolute;bottom:-40px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #fff9, #c9698a55);opacity:.5;animation:rise linear infinite}
  @keyframes rise{0%{transform:translateY(0) scale(.6);opacity:0}12%{opacity:.6}100%{transform:translateY(-115dvh) scale(1);opacity:0}}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:6;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;pointer-events:none}
  .avatar{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.6);border-radius:999px;padding:6px 12px 6px 6px;box-shadow:0 8px 20px -12px rgba(120,60,90,.5)}
  .face{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:#ffe3ec;transition:.2s}
  .name{font-size:12px;font-weight:700;line-height:1.25}
  .name small{display:block;color:var(--muted);font-weight:400;font-size:10.5px}
  .watching{display:flex;align-items:center;gap:6px;background:rgba(201,105,138,.14);color:var(--accent-deep);font-size:11.5px;font-weight:700;border-radius:999px;padding:6px 11px;opacity:0;transform:translateY(-6px);transition:.3s}
  .watching.on{opacity:1;transform:none}
  .watching .live{width:7px;height:7px;border-radius:50%;background:#e0466b;animation:blink 1.1s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

  .stage{position:relative;z-index:2;width:100%;max-width:420px}
  .card{background:var(--card);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.6);border-radius:30px;padding:30px 24px 26px;box-shadow:var(--shadow);text-align:center;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 50% -10%, rgba(255,255,255,.7), transparent 60%);pointer-events:none}

  .progress{display:flex;gap:7px;justify-content:center;margin-bottom:18px}
  .pip{width:8px;height:8px;border-radius:50%;background:#00000018;transition:.4s}
  .pip.on{background:var(--accent);transform:scale(1.25)}

  .screen{display:none;animation:fadeUp .5s cubic-bezier(.2,.8,.2,1) both}
  .screen.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  .emoji{font-size:44px;margin-bottom:10px;display:inline-block;animation:pop .6s cubic-bezier(.2,1.4,.4,1) both}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
  h1{font-size:22px;line-height:1.6;margin:4px 4px 6px;font-weight:800}
  .sub{color:var(--muted);font-size:14px;line-height:1.75;margin:0 2px 22px}

  button{font-family:inherit;font-size:16px;font-weight:700;border:none;border-radius:16px;padding:14px 30px;cursor:pointer;transition:transform .15s ease, box-shadow .2s ease}
  button:active{transform:scale(.96)}
  .primary{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;box-shadow:0 12px 24px -8px rgba(168,74,109,.7)}
  .primary:hover{transform:translateY(-2px)}
  .again{margin-top:6px;background:transparent;color:var(--accent-deep);font-size:13px;text-decoration:underline;padding:8px}

  /* scratch */
  .scratchwrap{position:relative}
  .hint{font-size:12.5px;color:var(--muted);margin:2px 0 10px}
  .scratchbox{position:relative;width:100%;height:230px;border-radius:22px;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05), 0 14px 30px -20px rgba(120,60,90,.6)}
  .reveal{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:22px;text-align:center;background:#fff}
  .reveal .ic{font-size:42px}
  .reveal .t{font-weight:800;font-size:18px}
  .reveal .x{color:#6f6470;font-size:14.5px;line-height:1.75}
  canvas.scratch{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:grab;display:block}
  .nextbtn{margin-top:16px;opacity:0;transform:translateY(8px);transition:.35s;pointer-events:none}
  .nextbtn.show{opacity:1;transform:none;pointer-events:auto}
  .cardcount{font-size:11.5px;color:#a99caf;margin-top:12px}

  #final .big{font-size:52px;animation:beat 1.1s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(1)}20%{transform:scale(1.18)}40%{transform:scale(1)}}
  .foot{text-align:center;color:#9a8d96;font-size:12px;margin-top:16px;position:relative;z-index:2}

  .spark{position:fixed;pointer-events:none;font-size:18px;z-index:5;animation:fly 1.1s ease-out forwards;opacity:0}
  @keyframes fly{0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}100%{opacity:0;transform:translate(var(--x),var(--y)) scale(1.1)}}
</style>
</head>
<body>
  <div class="sky" id="sky"></div>

  <div class="topbar">
    <div class="avatar">
      <div class="face" id="face">🙂</div>
      <div class="name">محمد<small id="faceSub">إلك هدية صغيرة</small></div>
    </div>
    <div class="watching" id="watching"><span class="live"></span> محمد يشاهد الآن</div>
  </div>

  <div class="stage">
    <div class="card">
      <div class="progress" id="progress"></div>

      <!-- intro -->
      <div id="intro" class="screen active">
        <div class="emoji">🎁</div>
        <h1>إلك… بطاقات تكشطيها</h1>
        <p class="sub">تحت كل بطاقة… إشي لاحظته فيكي، أو إشي لسا بدي اكتشفه عنك.<br>اكشطي بإصبعك 👆</p>
        <button class="primary" id="startBtn">يلا نبدأ</button>
      </div>

      <!-- cards injected here -->
      <div id="cards"></div>

      <!-- final -->
      <div id="final" class="screen">
        <div class="big">🤍</div>
        <h1>وبعدين؟</h1>
        <p class="sub">ما بعرفك كتير لهلأ… بس كل ما اكتشف إشي جديد عنك، بصير في إشي أحلى.<br>تسمحيلي أتعرّف عليكي… على مهلنا؟</p>
        <button class="again" onclick="restart()">من الأول 🔁</button>
      </div>
    </div>
    <div class="foot">صُنع إلك 🤍</div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  /* ---------- Firebase ---------- */
  let db=null, evRef=null, meRef=null;
  try{
    firebase.initializeApp({databaseURL:"https://testin-a1b3c-default-rtdb.firebaseio.com", projectId:"testin-a1b3c"});
    db=firebase.database(); evRef=db.ref('events'); meRef=db.ref('presence/aseel');
    meRef.onDisconnect().remove();
    meRef.set({online:true, since:firebase.database.ServerValue.TIMESTAMP, current:'كشط: البداية'});
    db.ref('presence/mohammad').on('value',s=>{
      const on=s.exists()&&s.val()&&s.val().online;
      document.getElementById('watching').classList.toggle('on',!!on);
    });
  }catch(e){ console.warn('firebase init failed', e); }
  const SESSION='s'+Math.random().toString(36).slice(2,9);
  function log(type, extra){ if(!evRef) return; try{ evRef.push(Object.assign({type,session:SESSION,ts:firebase.database.ServerValue.TIMESTAMP}, extra||{})); }catch(e){} }
  function setLive(c){ if(meRef){ try{ meRef.update({current:c, at:firebase.database.ServerValue.TIMESTAMP}); }catch(e){} } }

  /* ---------- Cards ---------- */
  const cards = [
    { ic:"👀", t:"عيونك", x:"أول إشي وقفني فيكي… عيونك. بصراحة، صعب حدا ما ينتبهلها." },
    { ic:"🙂", t:"ابتسامتك", x:"لما بتبتسمي… بيخفّ اليوم شوي. مش مجاملة، هيك بصير." },
    { ic:"✍️", t:"إنك بتحبي تكتبي", x:"حسّيتها فيكي… ويعجبني إنه عندك عالم داخلي إلك وحدك." },
    { ic:"🎨", t:"لونك المفضل؟", x:"لسا سرّ عندي… بس ناوي اكتشفه. خبّريني وخلّيه بيناتنا." },
    { ic:"🍚", t:"خمّنت إشي…", x:"حاسس إنك بتحبي الكبسة 🙈… صح؟ ولا خمّنت غلط؟" },
    { ic:"🎵", t:"أغنيتك", x:"الأغنية اللي بتوصف مودك هالفترة… ودّي أعرفها." }
  ];

  const cardsEl=document.getElementById('cards');
  const progressEl=document.getElementById('progress');
  const introEl=document.getElementById('intro');
  const finalEl=document.getElementById('final');
  const face=document.getElementById('face'), faceSub=document.getElementById('faceSub');
  let idx=-1;

  cards.forEach(()=>{const p=document.createElement('div');p.className='pip';progressEl.appendChild(p);});

  cards.forEach((c,i)=>{
    const s=document.createElement('div'); s.className='screen'; s.dataset.i=i;
    s.innerHTML=`
      <div class="scratchwrap">
        <p class="hint">اكشطي البطاقة تحت 👇</p>
        <div class="scratchbox">
          <div class="reveal">
            <div class="ic">${c.ic}</div>
            <div class="t">${c.t}</div>
            <div class="x">${c.x}</div>
          </div>
          <canvas class="scratch"></canvas>
        </div>
        <div class="cardcount">بطاقة ${i+1} من ${cards.length}</div>
        <button class="primary nextbtn">${i===cards.length-1?'خلّصنا 🤍':'البطاقة الجاية'}</button>
      </div>`;
    cardsEl.appendChild(s);
    s.querySelector('.nextbtn').addEventListener('click',()=>show(i+1));
  });

  function updatePips(){[...progressEl.children].forEach((p,i)=>p.classList.toggle('on', i<=idx));}

  function show(i){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    if(i<0){ introEl.classList.add('active'); progressEl.style.visibility='hidden'; idx=-1; setLive('كشط: البداية'); return; }
    progressEl.style.visibility='visible';
    if(i<cards.length){
      const el=[...cardsEl.children].find(s=>+s.dataset.i===i);
      el.classList.add('active'); idx=i; updatePips();
      face.textContent='🙂'; faceSub.textContent='شو رح تطلع؟';
      setLive('كشط: '+cards[i].t);
      requestAnimationFrame(()=>initScratch(el, i));
    }else{
      finalEl.classList.add('active');
      progressEl.querySelectorAll('.pip').forEach(p=>p.classList.add('on'));
      celebrate(); setLive('كشط: خلّصت 🤍'); log('scratch_done');
      face.textContent='😍'; faceSub.textContent='مبسوط 🤍';
    }
  }

  document.getElementById('startBtn').addEventListener('click',()=>{ log('scratch_start'); show(0); });

  /* ---------- scratch engine ---------- */
  function initScratch(cardEl, i){
    const box=cardEl.querySelector('.scratchbox');
    const canvas=cardEl.querySelector('canvas.scratch');
    if(!canvas || canvas.dataset.ready) return;
    canvas.dataset.ready='1';
    const dpr=Math.min(window.devicePixelRatio||1, 2);
    const w=box.clientWidth, h=box.clientHeight;
    canvas.width=w*dpr; canvas.height=h*dpr;
    const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
    const g=ctx.createLinearGradient(0,0,w,h);
    g.addColorStop(0,'#eebccf'); g.addColorStop(.5,'#d98cae'); g.addColorStop(1,'#c06d90');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
    // sheen stripes
    ctx.fillStyle='rgba(255,255,255,.12)';
    for(let sx=-h; sx<w; sx+=26){ ctx.beginPath(); ctx.moveTo(sx,0); ctx.lineTo(sx+h,h); ctx.lineTo(sx+h+10,h); ctx.lineTo(sx+10,0); ctx.closePath(); ctx.fill(); }
    ctx.fillStyle='rgba(255,255,255,.92)'; ctx.textAlign='center';
    ctx.font='bold 19px Arial'; ctx.fillText('🪙 اكشطي هون', w/2, h/2-4);
    ctx.font='13px Arial'; ctx.fillText('بإصبعك 👆', w/2, h/2+22);

    let drawing=false, revealed=false, lastCheck=0;
    const rectOf=()=>canvas.getBoundingClientRect();
    const pos=e=>{ const r=rectOf(); return {x:e.clientX-r.left, y:e.clientY-r.top}; };
    const scratch=(x,y)=>{ ctx.globalCompositeOperation='destination-out'; ctx.beginPath(); ctx.arc(x,y,26,0,Math.PI*2); ctx.fill();
      if(Math.random()<0.22){ const r=rectOf(); spark(r.left+x, r.top+y); } };
    const pct=()=>{ const img=ctx.getImageData(0,0,canvas.width,canvas.height).data; let clr=0,tot=0; for(let p=3;p<img.length;p+=4*40){ tot++; if(img[p]<128) clr++; } return clr/tot; };
    const reveal=()=>{ if(revealed) return; revealed=true;
      canvas.style.transition='opacity .45s ease'; canvas.style.opacity='0'; setTimeout(()=>{ if(canvas.parentNode) canvas.remove(); },460);
      cardEl.querySelector('.nextbtn').classList.add('show');
      face.textContent='😊'; faceSub.textContent='شفتيها 🤍';
      burstAt(box); log('scratch',{i, card:cards[i].t});
    };
    const maybeCheck=()=>{ const now=performance.now(); if(now-lastCheck<180) return; lastCheck=now; if(pct()>0.5) reveal(); };
    canvas.addEventListener('pointerdown',e=>{ e.preventDefault(); drawing=true; const {x,y}=pos(e); scratch(x,y); });
    canvas.addEventListener('pointermove',e=>{ if(!drawing) return; e.preventDefault(); const {x,y}=pos(e); scratch(x,y); maybeCheck(); });
    window.addEventListener('pointerup',()=>{ if(drawing){ drawing=false; if(pct()>0.4) reveal(); } });
  }

  function spark(px,py){ if(Math.random()>0.5) return; const e=document.createElement('div'); e.className='spark'; e.textContent=['✨','💫','⭐'][Math.floor(Math.random()*3)];
    e.style.left=px+'px'; e.style.top=py+'px'; const a=Math.random()*6.28,d=20+Math.random()*30;
    e.style.setProperty('--x',`calc(-50% + ${Math.cos(a)*d}px)`); e.style.setProperty('--y',`calc(-50% + ${Math.sin(a)*d}px)`);
    document.body.appendChild(e); setTimeout(()=>e.remove(),1100); }

  function burstAt(box){ const r=box.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2;
    const em=['💗','✨','🤍','🌸','💫']; for(let k=0;k<18;k++){ const e=document.createElement('div'); e.className='spark'; e.style.fontSize='22px'; e.textContent=em[k%em.length];
      e.style.left=cx+'px'; e.style.top=cy+'px'; const a=Math.random()*6.28,d=70+Math.random()*110;
      e.style.setProperty('--x',`calc(-50% + ${Math.cos(a)*d}px)`); e.style.setProperty('--y',`calc(-50% + ${Math.sin(a)*d}px)`);
      e.style.animationDelay=(Math.random()*.2)+'s'; document.body.appendChild(e); setTimeout(()=>e.remove(),1300); } }

  function celebrate(){ const em=['💗','🌷','✨','💞','🤍','🌸']; for(let k=0;k<26;k++){ const e=document.createElement('div'); e.className='spark'; e.style.fontSize='22px'; e.style.top='50%'; e.style.left='50%'; e.textContent=em[k%em.length];
    const a=Math.random()*6.28,d=120+Math.random()*180; e.style.setProperty('--x',`calc(-50% + ${Math.cos(a)*d}px)`); e.style.setProperty('--y',`calc(-50% + ${Math.sin(a)*d}px)`);
    e.style.animationDelay=(Math.random()*.25)+'s'; document.body.appendChild(e); setTimeout(()=>e.remove(),1600); } }

  function restart(){ finalEl.classList.remove('active');
    // rebuild canvases
    cardsEl.querySelectorAll('.scratchbox').forEach((box,i)=>{
      if(!box.querySelector('canvas.scratch')){ const c=document.createElement('canvas'); c.className='scratch'; box.appendChild(c); }
      box.querySelector('canvas.scratch').removeAttribute('data-ready');
      box.closest('.screen').querySelector('.nextbtn').classList.remove('show');
    });
    log('restart'); show(-1); }

  const sky=document.getElementById('sky');
  for(let i=0;i<14;i++){ const d=document.createElement('div'); d.className='dot'; d.style.left=Math.random()*100+'%';
    const size=8+Math.random()*16; d.style.width=d.style.height=size+'px'; d.style.animationDuration=(9+Math.random()*10)+'s'; d.style.animationDelay=(-Math.random()*12)+'s'; sky.appendChild(d); }

  show(-1);
</script>
</body>
</html>
