<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>لوحة محمد — مباشر</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:Arial,"Segoe UI",Tahoma,sans-serif;
    background:#12101a;color:#efe9f2;min-height:100dvh;padding:16px}
  .wrap{max-width:640px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
  h1{font-size:18px;margin:0}
  .status{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;
    background:#221d2e;border:1px solid #332b44;border-radius:999px;padding:7px 13px}
  .dot{width:9px;height:9px;border-radius:50%;background:#555;transition:.3s}
  .dot.on{background:#39d98a;box-shadow:0 0 0 4px #39d98a33;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .stat{background:#1b1726;border:1px solid #2c2540;border-radius:16px;padding:14px}
  .stat .k{font-size:11px;color:#9a8fae}
  .stat .v{font-size:20px;font-weight:800;margin-top:4px}
  .stat.full{grid-column:1/-1}
  .stat .v.small{font-size:15px;font-weight:700;line-height:1.5}

  .feedbox{background:#1b1726;border:1px solid #2c2540;border-radius:16px;overflow:hidden}
  .feedbox h2{font-size:13px;margin:0;padding:12px 14px;border-bottom:1px solid #2c2540;color:#c9bede}
  .feed{max-height:60dvh;overflow:auto;padding:6px}
  .row{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:12px;animation:in .3s ease both}
  .row+.row{margin-top:2px}
  @keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .ic{width:34px;height:34px;min-width:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;background:#2a2338}
  .row .txt{flex:1;font-size:14px}
  .row .txt small{display:block;color:#8f84a4;font-size:11px;margin-top:2px}
  .row.answer .ic{background:#1e2647}
  .row.yes .ic{background:#173a2a}
  .row.no_attempt .ic{background:#3a1720}
  .row.final .ic{background:#3a3417}
  .row.start .ic,.row.restart .ic{background:#1f2a3a}
  .empty{color:#7c7191;text-align:center;padding:30px 10px;font-size:13px}
  .clr{background:transparent;border:1px solid #3a3350;color:#b7abcf;border-radius:10px;
    padding:6px 12px;font-size:12px;font-family:inherit;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>👀 لوحة محمد — مباشر</h1>
    <div class="status"><span class="dot" id="pdot"></span><span id="ptext">أسيل غير متصلة</span></div>
  </header>

  <div class="cards">
    <div class="stat"><div class="k">إجمالي «نعم»</div><div class="v" id="cYes">0</div></div>
    <div class="stat"><div class="k">محاولات «لأ»</div><div class="v" id="cNo">0</div></div>
    <div class="stat full"><div class="k">وين واصلة الحين</div><div class="v small" id="cur">—</div></div>
  </div>

  <div class="feedbox">
    <h2 style="display:flex;justify-content:space-between;align-items:center">
      <span>السجل المباشر</span>
      <button class="clr" id="clr">مسح السجل</button>
    </h2>
    <div class="feed" id="feed"><div class="empty">بانتظار أول حركة من أسيل…</div></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    databaseURL:"https://testin-a1b3c-default-rtdb.firebaseio.com",
    projectId:"testin-a1b3c"
  });
  const db=firebase.database();

  /* --- set mohammad presence so her page shows "محمد يشاهد" --- */
  const meRef=db.ref('presence/mohammad');
  meRef.onDisconnect().remove();
  meRef.set({online:true, since:firebase.database.ServerValue.TIMESTAMP});

  /* --- watch aseel presence --- */
  const curMap={intro:'المقدمة',q1:'السؤال 1',q2:'السؤال 2',q3:'السؤال 3',q4:'السؤال 4',
    q5:'السؤال 5',q6:'السؤال 6',q7:'السؤال 7',q8:'السؤال 8',final:'خلّصت 🤍'};
  db.ref('presence/aseel').on('value',s=>{
    const on=s.exists()&&s.val()&&s.val().online;
    document.getElementById('pdot').classList.toggle('on',!!on);
    document.getElementById('ptext').textContent=on?'أسيل متصلة الآن':'أسيل غير متصلة';
    const cur=s.exists()&&s.val()?s.val().current:null;
    document.getElementById('cur').textContent=cur?(curMap[cur]||cur):'—';
  });

  /* --- live feed --- */
  const feed=document.getElementById('feed');
  const meta={
    start:{ic:'🚀',bg:'start',t:'أسيل بدأت'},
    answer:{ic:'💬',bg:'answer',t:'اختارت'},
    yes:{ic:'💗',bg:'yes',t:'قالت نعم'},
    no_attempt:{ic:'🙈',bg:'no_attempt',t:'حاولت تضغط لأ'},
    avoid:{ic:'🫣',bg:'no_attempt',t:'حاولت تختار جواب هرب منها'},
    final:{ic:'🎉',bg:'final',t:'وصلت للنهاية 🤍'},
    restart:{ic:'🔁',bg:'restart',t:'رجعت من الأول'}
  };
  let yes=0,no=0,first=true;
  function fmt(ts){ if(!ts) return ''; const d=new Date(ts);
    return d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

  db.ref('events').limitToLast(200).on('child_added',snap=>{
    const e=snap.val()||{}; const m=meta[e.type]||{ic:'•',bg:'',t:e.type};
    if(first){ feed.innerHTML=''; first=false; }
    if(e.type==='yes') document.getElementById('cYes').textContent=++yes;
    if(e.type==='no_attempt'||e.type==='avoid') document.getElementById('cNo').textContent=++no;
    let detail='';
    if(e.type==='yes'&&e.q) detail=e.q;
    else if(e.type==='answer') detail=(e.choice||'')+(e.q?' — '+e.q:'');
    else if(e.type==='avoid') detail='«'+(e.choice||'')+'» (محاولة '+(e.attempt||1)+')';
    else if(e.type==='no_attempt') detail='محاولة رقم '+(e.attempt||1);
    const row=document.createElement('div');
    row.className='row '+m.bg;
    row.innerHTML=`<div class="ic">${m.ic}</div>
      <div class="txt">${m.t}${detail?' — '+detail:''}<small>${fmt(e.ts)}</small></div>`;
    feed.appendChild(row);
    feed.scrollTop=feed.scrollHeight;
  });

  document.getElementById('clr').addEventListener('click',()=>{
    if(confirm('مسح كل السجل والعدادات؟')){
      db.ref('events').remove();
      yes=0;no=0;first=true;
      document.getElementById('cYes').textContent='0';
      document.getElementById('cNo').textContent='0';
      feed.innerHTML='<div class="empty">تم المسح — بانتظار حركة جديدة…</div>';
    }
  });
</script>
</body>
</html>
