<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#f5ede6" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>كم سؤال بسيط…</title>
<style>
  :root{
    --bg1:#f7efe8;
    --bg2:#efe3f0;
    --ink:#3b2f3a;
    --muted:#8a7d86;
    --accent:#c9698a;
    --accent-deep:#a84a6d;
    --card:rgba(255,255,255,.74);
    --shadow:0 24px 60px -24px rgba(120,60,90,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:Arial, "Segoe UI", Tahoma, sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
    padding:20px;
  }

  .sky{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .dot{
    position:absolute;bottom:-40px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #fff9, #c9698a55);
    opacity:.55;animation:rise linear infinite;
  }
  @keyframes rise{
    0%{transform:translateY(0) scale(.6);opacity:0}
    12%{opacity:.6}
    100%{transform:translateY(-115dvh) scale(1);opacity:0}
  }

  /* top presence bar (snapchat-style) */
  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:6;
    display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:12px 16px;
    pointer-events:none;
  }
  .avatar{
    display:flex;align-items:center;gap:9px;
    background:rgba(255,255,255,.72);backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.6);
    border-radius:999px;padding:6px 12px 6px 6px;
    box-shadow:0 8px 20px -12px rgba(120,60,90,.5);
  }
  .face{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;background:#ffe3ec;transition:.2s;
  }
  .face.angry{background:#ffd3d3;animation:shake .4s ease}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px) rotate(-6deg)}75%{transform:translateX(4px) rotate(6deg)}}
  .name{font-size:12px;font-weight:700;line-height:1.25}
  .name small{display:block;color:var(--muted);font-weight:400;font-size:10.5px}

  .watching{
    display:flex;align-items:center;gap:6px;
    background:rgba(201,105,138,.14);
    color:var(--accent-deep);font-size:11.5px;font-weight:700;
    border-radius:999px;padding:6px 11px;opacity:0;transform:translateY(-6px);
    transition:.3s;
  }
  .watching.on{opacity:1;transform:none}
  .watching .live{width:7px;height:7px;border-radius:50%;background:#e0466b;animation:blink 1.1s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

  /* speech bubble from mohammad */
  .bubble{
    position:fixed;top:56px;right:16px;z-index:6;
    background:#fff;color:var(--ink);font-size:12.5px;font-weight:700;
    padding:8px 12px;border-radius:14px 14px 14px 4px;
    box-shadow:0 10px 24px -12px rgba(0,0,0,.3);
    opacity:0;transform:translateY(-8px) scale(.9);transition:.22s;pointer-events:none;
  }
  .bubble.on{opacity:1;transform:none}

  .stage{position:relative;z-index:2;width:100%;max-width:420px}
  .card{
    background:var(--card);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.6);border-radius:30px;
    padding:34px 26px 30px;box-shadow:var(--shadow);
    text-align:center;position:relative;overflow:hidden;
  }
  .card::before{content:"";position:absolute;inset:0;
    background:radial-gradient(120% 80% at 50% -10%, rgba(255,255,255,.7), transparent 60%);pointer-events:none;}

  .progress{display:flex;gap:7px;justify-content:center;margin-bottom:22px}
  .pip{width:8px;height:8px;border-radius:50%;background:#00000018;transition:.4s}
  .pip.on{background:var(--accent);transform:scale(1.25)}

  .screen{display:none;animation:fadeUp .55s cubic-bezier(.2,.8,.2,1) both}
  .screen.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  .emoji{font-size:46px;margin-bottom:12px;display:inline-block;animation:pop .6s cubic-bezier(.2,1.4,.4,1) both}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}

  h1{font-size:22px;line-height:1.65;margin:6px 4px 6px;font-weight:700}
  .sub{color:var(--muted);font-size:14px;line-height:1.75;margin:0 2px 24px}
  .rules{text-align:right;margin:0 4px 24px;padding:0}
  .rules li{list-style:none;color:var(--muted);font-size:13.5px;line-height:1.6;margin:9px 0;padding-right:26px;position:relative}
  .rules li::before{content:attr(data-i);position:absolute;right:0;top:1px;font-size:16px}

  .opts{display:flex;flex-direction:column;gap:11px;align-items:stretch;position:relative;min-height:56px}
  .opt{background:#fff;color:var(--ink);border:1px solid #00000010;border-radius:16px;padding:15px 18px;font-size:15.5px;box-shadow:0 8px 18px -14px rgba(120,60,90,.5);transition:transform .16s ease, background .2s, box-shadow .2s}
  .opt:hover{background:#fff4f7;transform:translateY(-1px);box-shadow:0 12px 22px -14px rgba(168,74,109,.6)}
  .opt:active{transform:scale(.97)}
  .opt.open{background:#fbeff4;color:var(--accent-deep);border:1px dashed #d68aa6}
  .writebox{display:flex;gap:9px;align-items:center;margin-top:4px}
  .writebox[hidden]{display:none}
  .writebox.shake{animation:shake .4s ease}
  .wtext{flex:1;font-family:inherit;font-size:15px;color:var(--ink);background:#fff;
    border:1px solid #00000012;border-radius:14px;padding:14px 16px;outline:none;
    box-shadow:0 8px 18px -14px rgba(120,60,90,.5)}
  .wtext:focus{border-color:var(--accent)}
  .wsend{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;
    border-radius:14px;padding:14px 18px;font-size:15px;box-shadow:0 10px 20px -10px rgba(168,74,109,.7)}
  .btns{display:flex;gap:14px;justify-content:center;align-items:center;flex-wrap:wrap;min-height:56px}
  button{font-family:inherit;font-size:16px;font-weight:700;border:none;border-radius:16px;padding:14px 26px;cursor:pointer;transition:transform .15s ease, box-shadow .2s ease}
  button:active{transform:scale(.96)}
  .yes{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;box-shadow:0 12px 24px -8px rgba(168,74,109,.7)}
  .yes:hover{transform:translateY(-2px)}
  .no{background:#fff;color:var(--muted);border:1px solid #00000012;position:relative}
  .start{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;box-shadow:0 12px 24px -8px rgba(168,74,109,.7);padding:15px 40px;border-radius:18px;font-size:17px}

  #final .big{font-size:52px;animation:beat 1.1s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(1)}20%{transform:scale(1.18)}40%{transform:scale(1)}}
  .again{margin-top:8px;background:transparent;color:var(--accent-deep);font-size:13px;text-decoration:underline;padding:8px}
  .foot{text-align:center;color:#9a8d96;font-size:12px;margin-top:16px;position:relative;z-index:2}

  .burst{position:fixed;top:50%;left:50%;pointer-events:none;font-size:22px;z-index:5;animation:fly 1.3s ease-out forwards;opacity:0}
  @keyframes fly{0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}100%{opacity:0;transform:translate(var(--x),var(--y)) scale(1.1)}}
</style>
</head>
<body>
  <div class="sky" id="sky"></div>

  <!-- presence / mohammad avatar -->
  <div class="topbar">
    <div class="avatar">
      <div class="face" id="face">🙂</div>
      <div class="name">محمد<small id="faceSub">أهلين فيكي</small></div>
    </div>
    <div class="watching" id="watching"><span class="live"></span> محمد يشاهد الآن</div>
  </div>
  <div class="bubble" id="bubble"></div>

  <div class="stage">
    <div class="card">
      <div class="progress" id="progress"></div>

      <!-- intro -->
      <div id="intro" class="screen active">
        <div class="emoji">🤍</div>
        <h1>أهلين أسيل 🙂</h1>
        <p class="sub">لعبة صغيرة… كم سؤال حلو نتسلّى فيه.</p>
        <ul class="rules">
          <li data-i="🎯">جاوبي على راحتك، ما في جواب غلط.</li>
          <li data-i="✍️">وفي أسئلة بتقدري تكتبي جوابك فيها.</li>
          <li data-i="😄">وزر الـ«لأ»… بدلّع، لا تزعلي منه.</li>
        </ul>
        <div class="btns"><button class="start" id="startBtn">يلا نلعب</button></div>
      </div>

      <!-- questions injected here -->
      <div id="steps"></div>

      <!-- final -->
      <div id="final" class="screen">
        <div class="big">🤍</div>
        <h1>خلصت اللعبة 😊</h1>
        <p class="sub">عرفت عنك شوي… وحبّيت كل جواب 🙈<br>نكمّل الونسة عالراحة؟</p>
        <button class="again" onclick="restart()">نلعب كمان مرة 🔁</button>
      </div>
    </div>
    <div class="foot">صُنع بهدوء 🤍</div>
  </div>

<!-- Firebase (Realtime Database) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  /* ---------- Firebase ---------- */
  let db=null, evRef=null, meRef=null;
  try{
    firebase.initializeApp({
      databaseURL:"https://testin-a1b3c-default-rtdb.firebaseio.com",
      projectId:"testin-a1b3c"
    });
    db=firebase.database();
    evRef=db.ref('events');
    meRef=db.ref('presence/aseel');
    // aseel presence + cleanup on disconnect
    meRef.onDisconnect().remove();
    meRef.set({online:true, since:firebase.database.ServerValue.TIMESTAMP, current:'intro'});
    // watch mohammad presence -> "محمد يشاهد"
    db.ref('presence/mohammad').on('value',s=>{
      const on = s.exists() && s.val() && s.val().online;
      document.getElementById('watching').classList.toggle('on', !!on);
    });
  }catch(e){ console.warn('firebase init failed', e); }

  const SESSION = 's'+Math.random().toString(36).slice(2,9);
  function log(type, extra){
    if(!evRef) return;
    try{
      evRef.push(Object.assign({
        type, session:SESSION,
        ts:firebase.database.ServerValue.TIMESTAMP
      }, extra||{}));
    }catch(e){}
  }
  function setLive(current){
    if(meRef){ try{ meRef.update({current, at:firebase.database.ServerValue.TIMESTAMP}); }catch(e){} }
  }

  /* ---------- Questions ----------
     type 'choice' : أسئلة عنها تكشف تفكيرها بمحمد (كل خيار ينسجّل)
     type 'yesno'  : أسئلة حلوة، «نعم» بس، وزر «لأ» بيهرب ومحمد بيزعل  */
  const questions = [
    { type:"choice", emoji:"😊", q:"شو بيخليكي ترتاحي لحدا بسرعة؟",
      sub:"عشان أعرفك أكتر.",
      options:[
        {t:"صدقه",ok:true},{t:"خفة دمه",ok:true},
        {t:"اهتمامه",ok:true},{t:"هدوءه",ok:true}
      ] },

    { type:"choice", emoji:"✈️", q:"لو ربحتي تذكرة سفر بكرة الصبح… وين بتروحي؟",
      sub:"اختاري بسرعة 😄",
      options:[
        {t:"مادبا",ok:true},{t:"لقلبي 🤍",ok:true},
        {t:"جزيرة معزولة 🏝️",ok:true},{t:"اكتبيها ✍️",open:true}
      ] },

    { type:"choice", emoji:"☕", q:"لو طلعنا نتقهوى… شو أجواءك؟",
      sub:"تخيّلي بس 🙂",
      options:[
        {t:"قهوة وحكي طويل",ok:true},{t:"مشوار وموسيقى 🎶",ok:true},
        {t:"أكل ومسخرة",ok:true},{t:"مكان هادي 🌙",ok:true}
      ] },

    { type:"choice", emoji:"💘", q:"شو أكتر إشي بيكسب قلبك بشخص؟",
      sub:"بصراحة 🤍",
      options:[
        {t:"حس الفكاهة",ok:true},{t:"الذكاء",ok:true},
        {t:"الطيبة",ok:true},{t:"اكتبيها ✍️",open:true}
      ] },

    { type:"choice", emoji:"🙃", q:"بتعتبري حالك سهلة القراءة… ولا لغز؟",
      sub:"سؤال بسيط 😌",
      options:[
        {t:"لغز 🙈",ok:true},{t:"كتاب مفتوح",ok:true},
        {t:"حسب الشخص",ok:true},{t:"اكتشفني بنفسك 😌",ok:true}
      ] },

    { type:"choice", emoji:"🔮", q:"شو بتختاري؟",
      sub:"لو كان بإيدك 😌",
      options:[
        {t:"تعرفي شو بيفكّروا الناس فيكي",ok:true},{t:"تعرفي المستقبل",ok:true},
        {t:"ترجعي بالزمن",ok:true},{t:"اكتبيها ✍️",open:true}
      ] },

    { type:"choice", emoji:"💬", q:"لو حدا بيهمّه أمرك… بتحبي يبيّنها كيف؟",
      sub:"بصراحة صغيرة 🤍",
      options:[
        {t:"بكلام حلو ولطيف",ok:true},{t:"بالأفعال أكتر",ok:true},
        {t:"شوي شوي على مهل",ok:true},{t:"ما بحب حدا يهتم 🙄",ok:false}
      ] },

    { type:"choice", emoji:"😤", q:"أكتر إشي بيعصّبك منّي؟",
      sub:"قوليها بلا زعل 😄",
      options:[
        {t:"إنك بتغزّل كتير 😏",ok:true},{t:"إنك بتردّ متأخر",ok:true},
        {t:"لا شي… بتعجبني هيك 🙈",ok:true},{t:"اكتبيها ✍️",open:true}
      ] },

    { type:"choice", emoji:"🔥", q:"لو قرّبت منّك فجأة… وهمست بإذنك، شو بتعملي؟",
      sub:"بصراحة 😏",
      options:[
        {t:"بتسمّر بمكاني 🙈",ok:true},{t:"بكسّف بس بيعجبني",ok:true},
        {t:"بهمس ردّ 😏",ok:true},{t:"بابعد 🙄",ok:false}
      ] },

    { type:"choice", emoji:"🌟", q:"شو بيوصل لقلبك أكتر؟",
      sub:"بينا وبينك.",
      options:[
        {t:"الاهتمام الصادق",ok:true},{t:"الكلام الحلو",ok:true},
        {t:"الأفعال",ok:true},{t:"خلّيني أشوف 😊",ok:true}
      ] },

    { type:"text", emoji:"🎵", q:"الأغنية اللي بتوصف مزاجك هالفترة؟",
      sub:"اكتبيلي اسمها 🎧", placeholder:"اسم الأغنية…", send:"هي 🎶" },

    { type:"choice", emoji:"🎁", q:"لو حدا حبّ يفرّح يومك بإشي صغير…",
      sub:"إشي بسيط بس 🤍",
      options:[
        {t:"رسالة حلوة الصبح 💌",ok:true},{t:"قهوتك المفضلة ☕",ok:true},
        {t:"ورد 🌷",ok:true},{t:"مش ناقصة إشي 🙅",ok:false}
      ] },

    { type:"yesno", emoji:"🤍", q:"نكمّل نحكي ونتعرّف… عالراحة؟",
      sub:"إنتي بتحدّدي الإيقاع.", yes:"يلا", no:"لأ" }
  ];

  const stepsEl=document.getElementById('steps');
  const progressEl=document.getElementById('progress');
  const introEl=document.getElementById('intro');
  const finalEl=document.getElementById('final');
  const face=document.getElementById('face');
  const faceSub=document.getElementById('faceSub');
  const bubble=document.getElementById('bubble');
  let idx=-1; // -1 = intro

  questions.forEach(()=>{const p=document.createElement('div');p.className='pip';progressEl.appendChild(p);});

  function attachWrite(box, i, q){
    const inp=box.querySelector('.wtext'), btn=box.querySelector('.wsend');
    const submit=()=>{
      const val=inp.value.trim();
      if(!val){ inp.focus(); box.classList.add('shake'); setTimeout(()=>box.classList.remove('shake'),400); return; }
      log('answer',{qIndex:i, q, choice:val, open:true});
      show(i+1);
    };
    btn.addEventListener('click',submit);
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();submit();} });
  }

  questions.forEach((item,i)=>{
    const s=document.createElement('div');
    s.className='screen';s.dataset.i=i;

    if(item.type==='choice'){
      const opts=item.options.map(o=>{
        const cls=o.open?'opt open':(o.ok?'opt':'opt bad');
        return `<button class="${cls}" data-t="${o.t}"${o.open?' data-open="1"':''}>${o.t}</button>`;
      }).join('');
      s.innerHTML=`
        <div class="emoji">${item.emoji}</div>
        <h1>${item.q}</h1>
        <p class="sub">${item.sub}</p>
        <div class="opts">${opts}</div>
        <div class="writebox" hidden>
          <input class="wtext" type="text" placeholder="اكتبي هون…" maxlength="120" />
          <button class="wsend">إرسال</button>
        </div>`;
      stepsEl.appendChild(s);
      const writebox=s.querySelector('.writebox');
      s.querySelectorAll('.opt').forEach(b=>{
        if(b.dataset.open){
          b.addEventListener('click',()=>{
            s.querySelector('.opts').style.display='none';
            writebox.hidden=false;
            writebox.querySelector('.wtext').focus();
          });
        }else if(b.classList.contains('bad')){
          setupNo(b, i, b.dataset.t);        // dodges + محمد يزعل
        }else{
          b.addEventListener('click',()=>{
            log('answer',{qIndex:i, q:item.q, choice:b.dataset.t});
            show(i+1);
          });
        }
      });
      attachWrite(writebox, i, item.q);

    }else if(item.type==='text'){
      s.innerHTML=`
        <div class="emoji">${item.emoji}</div>
        <h1>${item.q}</h1>
        <p class="sub">${item.sub}</p>
        <div class="writebox">
          <input class="wtext" type="text" placeholder="${item.placeholder||'اكتبي هون…'}" maxlength="120" />
          <button class="wsend">${item.send||'إرسال'}</button>
        </div>`;
      stepsEl.appendChild(s);
      attachWrite(s.querySelector('.writebox'), i, item.q);

    }else{
      s.innerHTML=`
        <div class="emoji">${item.emoji}</div>
        <h1>${item.q}</h1>
        <p class="sub">${item.sub}</p>
        <div class="btns">
          <button class="yes">${item.yes}</button>
          <button class="no">${item.no}</button>
        </div>`;
      stepsEl.appendChild(s);
      s.querySelector('.yes').addEventListener('click',()=>{
        log('yes',{qIndex:i, q:item.q});
        show(i+1);
      });
      setupNo(s.querySelector('.no'), i);
    }
  });

  function updatePips(){[...progressEl.children].forEach((p,i)=>p.classList.toggle('on', i<=idx));}

  function show(i){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    if(i<0){ introEl.classList.add('active'); progressEl.style.visibility='hidden'; idx=-1; setLive('intro'); return; }
    progressEl.style.visibility='visible';
    if(i<questions.length){
      const el=[...stepsEl.children].find(s=>+s.dataset.i===i);
      el.classList.add('active'); idx=i; updatePips();
      setHappy(); setLive('q'+(i+1));
    }else{
      finalEl.classList.add('active');
      progressEl.querySelectorAll('.pip').forEach(p=>p.classList.add('on'));
      celebrate(); setLive('final'); log('final');
      face.textContent='😍'; faceSub.textContent='مبسوط 🤍';
    }
  }

  document.getElementById('startBtn').addEventListener('click',()=>{ log('start'); show(0); });

  /* ---------- mohammad face reactions ---------- */
  const angryFaces=['😠','😤','😾','🙄'];
  const angryLines=['لأ؟ ليش بس 😠','ما بينفع 😤','رجّعي إيدك 🙈','ولا تفكري 😾'];
  let bubbleT=null;
  function setHappy(){ face.classList.remove('angry'); face.textContent='🙂'; faceSub.textContent='مستني جوابك'; }
  function getAngry(n){
    face.classList.remove('angry'); void face.offsetWidth; face.classList.add('angry');
    face.textContent=angryFaces[Math.min(n,angryFaces.length-1)];
    faceSub.textContent='زعل شوي 😤';
    bubble.textContent=angryLines[Math.min(n,angryLines.length-1)];
    bubble.classList.add('on');
    clearTimeout(bubbleT);
    bubbleT=setTimeout(()=>{ bubble.classList.remove('on'); if(idx>=0) setHappy(); },1400);
  }

  /* ---------- escaping "no" / disliked option ---------- */
  function setupNo(btn, qIndex, choice){
    let dodge=0;
    const isChoice=!!choice;
    const noTaunts=["ما في لأ 😌","حاولي كمان 🙈","القلب أدرى 💗","خلص فوتي 😄","اقتربتي… بس لأ 🚫"];
    const move=()=>{
      const row=btn.closest('.btns,.opts').getBoundingClientRect();
      const b=btn.getBoundingClientRect();
      const maxX=Math.max(50,(row.width-b.width)/2-8);
      const nx=(Math.random()*2-1)*maxX;
      const ny=(Math.random()*2-1)*(isChoice?16:22);
      btn.style.position='relative';btn.style.zIndex='3';btn.style.transition='transform .16s ease';
      dodge++;
      const scale=Math.max(.72,1-dodge*0.05);
      btn.style.transform=`translate(${nx}px, ${ny}px) rotate(${(Math.random()*18-9)}deg) scale(${scale})`;
      if(!isChoice) btn.textContent=noTaunts[Math.min(dodge-1,noTaunts.length-1)];
      getAngry(dodge-1);
      if(isChoice) log('avoid',{qIndex, choice, attempt:dodge});
      else log('no_attempt',{qIndex, attempt:dodge});
    };
    btn.addEventListener('mouseenter',move);
    btn.addEventListener('touchstart',e=>{e.preventDefault();move();},{passive:false});
    btn.addEventListener('click',e=>{e.preventDefault();move();});
  }

  function celebrate(){
    const em=["💗","🌷","✨","💞","🤍","🌸"];
    for(let i=0;i<26;i++){
      const e=document.createElement('div');e.className='burst';e.textContent=em[i%em.length];
      const ang=Math.random()*Math.PI*2, dist=120+Math.random()*180;
      e.style.setProperty('--x',`calc(-50% + ${Math.cos(ang)*dist}px)`);
      e.style.setProperty('--y',`calc(-50% + ${Math.sin(ang)*dist}px)`);
      e.style.animationDelay=(Math.random()*.25)+'s';
      document.body.appendChild(e);setTimeout(()=>e.remove(),1600);
    }
  }

  function restart(){
    finalEl.classList.remove('active');
    document.querySelectorAll('.no').forEach(b=>{b.style.transform='';b.textContent='لأ';});
    setHappy(); log('restart'); show(-1);
  }

  /* background dots */
  const sky=document.getElementById('sky');
  for(let i=0;i<16;i++){
    const d=document.createElement('div');d.className='dot';
    d.style.left=Math.random()*100+'%';
    const size=8+Math.random()*16;d.style.width=d.style.height=size+'px';
    d.style.animationDuration=(9+Math.random()*10)+'s';
    d.style.animationDelay=(-Math.random()*12)+'s';
    sky.appendChild(d);
  }

  show(-1);
</script>
</body>
</html>
