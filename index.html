<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#141830" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>تصبحي على خير</title>
<style>
  :root{ --t:1; --line:#f0dfb8; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{margin:0;height:100%}
  body{
    font-family:Arial,"Segoe UI",Tahoma,sans-serif;
    background:linear-gradient(170deg,#10142b 0%,#1c1b38 55%,#2e2140 100%);
    color:#efe8dc;
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    overflow:hidden;position:relative;padding:26px;
  }

  /* twinkling background stars */
  .bg{position:fixed;inset:0;pointer-events:none;z-index:0}
  .tw{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.25;animation:tw ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.12}50%{opacity:.6}}

  .scene{position:relative;z-index:2;width:min(86vw,360px)}
  svg{width:100%;height:auto;display:block;transition:filter calc(var(--t)*2s) ease}
  body.done svg{filter:drop-shadow(0 0 14px rgba(240,223,184,.35))}

  path{fill:none;stroke:var(--line);stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
  .draw{stroke-dasharray:1;stroke-dashoffset:1;animation:draw linear forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .p-moon {animation-duration:calc(var(--t)*7s);  animation-delay:calc(var(--t)*.6s)}
  .p-cloud{animation-duration:calc(var(--t)*4s);  animation-delay:calc(var(--t)*7.8s)}
  .p-s1   {animation-duration:calc(var(--t)*1.5s);animation-delay:calc(var(--t)*11.9s)}
  .p-s2   {animation-duration:calc(var(--t)*1.5s);animation-delay:calc(var(--t)*13.5s)}
  .p-s3   {animation-duration:calc(var(--t)*1.5s);animation-delay:calc(var(--t)*15.1s)}
  .p-shoot{animation-duration:calc(var(--t)*2.1s);animation-delay:calc(var(--t)*16.9s)}

  .msg{
    text-align:center;margin-top:30px;z-index:2;
    opacity:0;transform:translateY(10px);
    transition:opacity calc(var(--t)*2.4s) ease, transform calc(var(--t)*2.4s) ease;
  }
  body.done .msg{opacity:1;transform:none}
  .msg h1{font-size:24px;font-weight:800;margin:0 0 10px;letter-spacing:.3px}
  .msg p{font-size:14.5px;color:#bfb4c9;margin:0;line-height:1.9}

  .again{
    margin-top:26px;z-index:2;background:none;border:none;color:#8f84a4;
    font-family:inherit;font-size:18px;cursor:pointer;opacity:0;transition:opacity calc(var(--t)*2s) ease;
    padding:8px 14px;
  }
  body.done .again{opacity:.7}
</style>
</head>
<body>
  <div class="bg" id="bg"></div>

  <div class="scene">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" aria-label="رسمة ليل">
      <!-- moon -->
      <path class="draw p-moon" pathLength="1"
        d="M 252 62 A 106 106 0 1 0 252 274 A 132 132 0 0 1 252 62 Z"/>
      <!-- cloud -->
      <path class="draw p-cloud" pathLength="1"
        d="M 54 330 Q 58 306 82 308 Q 92 288 116 294 Q 134 282 152 296 Q 174 292 178 314 Q 196 320 190 336 L 54 336 Z"/>
      <!-- sparkles -->
      <path class="draw p-s1" pathLength="1"
        d="M 92 84 Q 94 98 108 100 Q 94 102 92 116 Q 90 102 76 100 Q 90 98 92 84 Z"/>
      <path class="draw p-s2" pathLength="1"
        d="M 330 150 Q 331.5 161 342 162.5 Q 331.5 164 330 175 Q 328.5 164 318 162.5 Q 328.5 161 330 150 Z"/>
      <path class="draw p-s3" pathLength="1"
        d="M 118 232 Q 119.5 243 130 244.5 Q 119.5 246 118 257 Q 116.5 246 106 244.5 Q 116.5 243 118 232 Z"/>
      <!-- shooting star -->
      <path class="draw p-shoot" pathLength="1"
        d="M 30 196 Q 80 164 118 152 M 128 148 Q 131 151 135 147"/>
    </svg>
  </div>

  <div class="msg">
    <h1>تصبحي على خير</h1>
    <p>شكرًا إنك هون 🤍</p>
  </div>

  <button class="again" onclick="location.reload()" aria-label="إعادة">↺</button>

<script>
  // ?fast for quick preview/testing
  const FAST=new URLSearchParams(location.search).has('fast');
  const T=FAST?0.08:1;
  if(FAST) document.documentElement.style.setProperty('--t', T);

  // message appears after the drawing finishes
  setTimeout(()=>document.body.classList.add('done'), 19600*T);

  // background twinkles
  const bg=document.getElementById('bg');
  for(let i=0;i<40;i++){
    const s=document.createElement('div'); s.className='tw';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    const sz=1+Math.random()*2; s.style.width=s.style.height=sz+'px';
    s.style.animationDuration=(2.5+Math.random()*4)+'s';
    s.style.animationDelay=(-Math.random()*5)+'s';
    bg.appendChild(s);
  }
</script>
</body>
</html>
