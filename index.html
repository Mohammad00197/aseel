<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#f5ede6" />
<title>سؤال بسيط…</title>
<style>
  :root{
    --bg1:#f7efe8;
    --bg2:#efe3f0;
    --ink:#3b2f3a;
    --muted:#8a7d86;
    --accent:#c9698a;
    --accent-deep:#a84a6d;
    --card:rgba(255,255,255,.72);
    --shadow:0 24px 60px -24px rgba(120,60,90,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:Arial, "Segoe UI", Tahoma, sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
    padding:22px;
  }

  /* floating soft dots */
  .sky{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .dot{
    position:absolute;bottom:-40px;
    width:14px;height:14px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #fff9, #c9698a55);
    opacity:.55;
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{transform:translateY(0) scale(.6);opacity:0}
    12%{opacity:.6}
    100%{transform:translateY(-115dvh) scale(1);opacity:0}
  }

  .stage{position:relative;z-index:2;width:100%;max-width:420px}

  .card{
    background:var(--card);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.6);
    border-radius:30px;
    padding:34px 26px 30px;
    box-shadow:var(--shadow);
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(120% 80% at 50% -10%, rgba(255,255,255,.7), transparent 60%);
    pointer-events:none;
  }

  .progress{
    display:flex;gap:7px;justify-content:center;margin-bottom:22px;
  }
  .pip{width:8px;height:8px;border-radius:50%;background:#00000018;transition:.4s}
  .pip.on{background:var(--accent);transform:scale(1.25)}

  .step{display:none;animation:fadeUp .55s cubic-bezier(.2,.8,.2,1) both}
  .step.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

  .emoji{font-size:46px;margin-bottom:12px;display:inline-block;animation:pop .6s cubic-bezier(.2,1.4,.4,1) both}
  @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}

  h1{font-size:23px;line-height:1.65;margin:6px 4px 6px;font-weight:700}
  .sub{color:var(--muted);font-size:14px;line-height:1.7;margin:0 2px 24px}

  .btns{display:flex;gap:14px;justify-content:center;align-items:center;flex-wrap:wrap;min-height:56px}

  button{
    font-family:inherit;font-size:16px;font-weight:700;
    border:none;border-radius:16px;padding:14px 26px;cursor:pointer;
    transition:transform .15s ease, box-shadow .2s ease;
  }
  button:active{transform:scale(.96)}

  .yes{
    background:linear-gradient(135deg,var(--accent),var(--accent-deep));
    color:#fff;box-shadow:0 12px 24px -8px rgba(168,74,109,.7);
  }
  .yes:hover{transform:translateY(-2px)}

  .no{
    background:#fff;color:var(--muted);
    border:1px solid #00000012;
    position:relative;
  }

  /* final screen */
  #final{text-align:center}
  #final .big{font-size:52px;animation:beat 1.1s ease-in-out infinite}
  @keyframes beat{0%,100%{transform:scale(1)}20%{transform:scale(1.18)}40%{transform:scale(1)}}
  #final h1{font-size:26px}
  #final .sub{font-size:15px}
  .again{
    margin-top:8px;background:transparent;color:var(--accent-deep);
    font-size:13px;text-decoration:underline;padding:8px;
  }

  .foot{
    text-align:center;color:#9a8d96;font-size:12px;margin-top:16px;
    position:relative;z-index:2;
  }

  /* burst hearts on final */
  .burst{position:fixed;top:50%;left:50%;pointer-events:none;font-size:22px;z-index:5;
    animation:fly 1.3s ease-out forwards;opacity:0}
  @keyframes fly{
    0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}
    100%{opacity:0;transform:translate(var(--x),var(--y)) scale(1.1)}
  }
</style>
</head>
<body>
  <div class="sky" id="sky"></div>

  <div class="stage">
    <div class="card">
      <div class="progress" id="progress"></div>

      <!-- steps injected by JS -->
      <div id="steps"></div>

      <!-- final -->
      <div id="final" class="step">
        <div class="big">💗</div>
        <h1>كنت متأكد إنك رح تقولي… نعم</h1>
        <p class="sub">مش لأني حزّرت، بس لأنه في حاجات القلب بيحسّها قبل ما تنقال.<br>خلّينا نكمل الحكاية… على راحتنا.</p>
        <button class="again" onclick="restart()">من الأول 🔁</button>
      </div>
    </div>
    <div class="foot">صُنع بكل صدق 🤍</div>
  </div>

<script>
  const questions = [
    {
      emoji:"🌙",
      q:"تفتكري إنه في صُدَف… بتكون مقصودة؟",
      sub:"في ناس منقابلها بالصدفة، بس بتفضل معنا مش صدفة.",
      yes:"أكيد", no:"لأ"
    },
    {
      emoji:"☕",
      q:"لو حكيتلك إنه في حدا اسمك بيفرّق معه… رح تصدقي؟",
      sub:"مش لازم أقول مين… بس إنتي أذكى من إنك ما تحزري.",
      yes:"بصدّق", no:"لأ"
    },
    {
      emoji:"✨",
      q:"تسمحيلي أعرفك أكتر… على مهل؟",
      sub:"بدون استعجال، بدون ضغط… بس بصدق.",
      yes:"اسمحلك", no:"لأ"
    },
    {
      emoji:"🌷",
      q:"وإذا قلتلك إنه أنا هالحدا… بتقبلي نبدأ؟",
      sub:"سؤال واحد صغير… وجواب ممكن يغيّر أشياء حلوة.",
      yes:"نعم 💗", no:"لأ"
    }
  ];

  const stepsEl = document.getElementById('steps');
  const progressEl = document.getElementById('progress');
  const finalEl = document.getElementById('final');
  let idx = 0;

  // build pips
  questions.forEach(()=>{
    const p=document.createElement('div');p.className='pip';progressEl.appendChild(p);
  });

  // build steps
  questions.forEach((item,i)=>{
    const s=document.createElement('div');
    s.className='step';s.dataset.i=i;
    s.innerHTML=`
      <div class="emoji">${item.emoji}</div>
      <h1>${item.q}</h1>
      <p class="sub">${item.sub}</p>
      <div class="btns">
        <button class="yes">${item.yes}</button>
        <button class="no">${item.no}</button>
      </div>`;
    stepsEl.appendChild(s);
    s.querySelector('.yes').addEventListener('click',()=>next(i));
    setupNo(s.querySelector('.no'));
  });

  function updatePips(){
    [...progressEl.children].forEach((p,i)=>p.classList.toggle('on', i<=idx));
  }

  function show(i){
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    if(i<questions.length){
      const el=[...stepsEl.children].find(s=>+s.dataset.i===i);
      el.classList.add('active');
      idx=i;updatePips();
    }else{
      finalEl.classList.add('active');
      progressEl.querySelectorAll('.pip').forEach(p=>p.classList.add('on'));
      celebrate();
    }
  }

  function next(i){
    // little confirm pulse then advance
    show(i+1);
  }

  // ---- the escaping "no" button ----
  function setupNo(btn){
    let dodgeCount=0;
    const taunts=["ما في لأ 😌","حاولي كمان 🙈","القلب قرّر 💗","خلص فوت 😄","اقتربتي… بس لأ 🚫"];
    const move=()=>{
      const btns=btn.closest('.btns').getBoundingClientRect();
      const b=btn.getBoundingClientRect();
      const pad=8;
      // horizontal room across the buttons row; tiny vertical wiggle only
      const maxX=Math.max(60,(btns.width-b.width)/2-pad);
      const nx=(Math.random()*2-1)*maxX;
      const ny=(Math.random()*2-1)*22;
      btn.style.position='relative';
      btn.style.zIndex='3';
      btn.style.transition='transform .16s ease';
      dodgeCount++;
      const scale=Math.max(.72,1-dodgeCount*0.05);
      btn.style.transform=`translate(${nx}px, ${ny}px) rotate(${(Math.random()*20-10)}deg) scale(${scale})`;
      btn.textContent=taunts[Math.min(dodgeCount-1,taunts.length-1)];
    };
    // dodge on hover (desktop) and on touch/press attempt (mobile)
    btn.addEventListener('mouseenter',move);
    btn.addEventListener('touchstart',(e)=>{e.preventDefault();move();},{passive:false});
    btn.addEventListener('click',(e)=>{e.preventDefault();move();});
  }

  function celebrate(){
    const emojis=["💗","🌷","✨","💞","🤍","🌸"];
    for(let i=0;i<26;i++){
      const e=document.createElement('div');
      e.className='burst';e.textContent=emojis[i%emojis.length];
      const ang=Math.random()*Math.PI*2, dist=120+Math.random()*180;
      e.style.setProperty('--x',`calc(-50% + ${Math.cos(ang)*dist}px)`);
      e.style.setProperty('--y',`calc(-50% + ${Math.sin(ang)*dist}px)`);
      e.style.animationDelay=(Math.random()*.25)+'s';
      document.body.appendChild(e);
      setTimeout(()=>e.remove(),1600);
    }
  }

  function restart(){
    finalEl.classList.remove('active');
    // reset no buttons
    document.querySelectorAll('.no').forEach(b=>{
      b.style.transform='';b.textContent='لأ';
    });
    show(0);
  }

  // background dots
  const sky=document.getElementById('sky');
  for(let i=0;i<16;i++){
    const d=document.createElement('div');d.className='dot';
    d.style.left=Math.random()*100+'%';
    const size=8+Math.random()*16;
    d.style.width=d.style.height=size+'px';
    d.style.animationDuration=(9+Math.random()*10)+'s';
    d.style.animationDelay=(-Math.random()*12)+'s';
    sky.appendChild(d);
  }

  // start
  show(0);
</script>
</body>
</html>
